server:
  port: 8080
#  servlet:
#    context-path: /api

spring:
  application:
    name: my-app
  datasource:
    url: jdbc:mysql://localhost:3306/test
    username: root
    password: ${DB_PASSWORD:123456}  # 环境变量，默认值
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

app:
  api:
    trace-header-name: X-Trace-Id
    system-error-message: 系统异常，请稍后再试
  auth:
    secret: ${AUTH_TOKEN_SECRET:book-manage-dev-secret}
    expire-seconds: ${AUTH_TOKEN_EXPIRE_SECONDS:7200}
    token-header: Authorization
    token-prefix: "Bearer "
  file:
    upload-dir: "E://CODE//大佬//book-manage//target//upload"

logging:
  level:
    root: INFO
    com.example: DEBUG
  file:
    name: logs/app.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId}] [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId}] [%thread] %-5level %logger{36} - %msg%n"
