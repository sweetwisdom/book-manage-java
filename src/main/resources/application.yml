server:
  port: 8080
#  servlet:
#    context-path: /api

spring:
  application:
    name: my-app
  datasource:
    url: jdbc:mysql://localhost:3306/test
    username: root
    password: ${DB_PASSWORD:123456}  # 环境变量，默认值
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

app:
  api:
    trace-header-name: X-Trace-Id
    system-error-message: 系统异常，请稍后再试

logging:
  level:
    root: INFO
    com.example: DEBUG
  file:
    name: logs/app.log
